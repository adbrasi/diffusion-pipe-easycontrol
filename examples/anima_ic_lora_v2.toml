output_dir = '/workspace/ic_lora_v2_output'
dataset = 'examples/anima_ic_lora_dataset.toml'

epochs = 15
micro_batch_size_per_gpu = 1
gradient_accumulation_steps = 4
gradient_clipping = 1.0
warmup_steps = 100
save_every_n_epochs = 1
save_every_n_steps = 250
activation_checkpointing = true
pipeline_stages = 1
partition_method = 'parameters'

[model]
type = 'ic_lora_v2'
transformer_path = '/workspace/models_anima/split_files/diffusion_models/anima-preview2.safetensors'
vae_path = '/workspace/models_anima/split_files/vae/qwen_image_vae.safetensors'
llm_path = '/workspace/models_anima/split_files/text_encoders/qwen_3_06b_base.safetensors'
dtype = 'bfloat16'

# IC-LoRA V2 inherits from ic_lora_full — these settings control training behavior
[ic_lora_full]
ref_first = true               # LTX-2 convention: [ref T=0, target T=1]
condition_dropout = 0.1         # enables CFG at inference
condition_timestep = 0.0        # ref stays clean (standard)

# LoRA applied ONLY to self_attn + mlp (excludes adaln_modulation and cross_attn)
# Higher rank recommended since we have fewer targets but more focused capacity
# NOTE: train.py forces alpha=rank automatically. Do NOT set alpha here.
[adapter]
type = 'lora'
rank = 64

[optimizer]
type = 'adamw_optimi'
lr = 1e-4
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8
