output_dir = '/workspace/ic_lora_v2_output'
dataset = 'examples/anima_ic_lora_dataset.toml'

epochs = 15
micro_batch_size_per_gpu = 1
gradient_accumulation_steps = 4
gradient_clipping = 1.0
warmup_steps = 100
save_every_n_epochs = 1
save_every_n_steps = 250
activation_checkpointing = true
pipeline_stages = 1
partition_method = 'parameters'

[model]
type = 'ic_lora_v2'
transformer_path = '/workspace/models_anima/split_files/diffusion_models/anima-preview2.safetensors'
vae_path = '/workspace/models_anima/split_files/vae/qwen_image_vae.safetensors'
llm_path = '/workspace/models_anima/split_files/text_encoders/qwen_3_06b_base.safetensors'
dtype = 'bfloat16'
sigmoid_scale = 1.3
llm_adapter_lr = 0

# IC-LoRA V2 inherits from ic_lora_full — these settings control training behavior
[ic_lora_full]
ref_first = true               # LTX-2 convention: [ref T=0, target T=1]
condition_dropout = 0.1         # enables CFG at inference
condition_timestep = 0.0        # ref stays clean (standard)

# Shifted logit-normal timestep sampler (LTX-2 style).
# Only active when timestep_sample_method = 'logit_normal' (the default).
# The shift (logit-normal mean) is linearly interpolated based on token count:
#   num_tokens ≤ min_tokens → shift = min_shift (near-uniform timestep distribution)
#   num_tokens ≥ max_tokens → shift = max_shift (biased toward higher noise levels)
# For Anima: num_tokens = num_frames * (H_latent/2) * (W_latent/2)
# At 512x512 latent (64x64), 1 frame: num_tokens = 1 * 32 * 32 = 1024 → min_shift
# At 512x512 latent (64x64), 4 frames: num_tokens = 4 * 32 * 32 = 4096 → max_shift
shifted_logit_normal = true    # false = standard logit-normal (mean=0, no shift)
min_tokens = 1024              # token count that maps to min_shift
max_tokens = 4096              # token count that maps to max_shift
min_shift = 0.95               # shift for short sequences
max_shift = 2.05               # shift for long sequences

# LoRA applied ONLY to self_attn + mlp (excludes adaln_modulation and cross_attn)
# Higher rank recommended since we have fewer targets but more focused capacity
# NOTE: train.py forces alpha=rank automatically. Do NOT set alpha here.
[adapter]
type = 'lora'
rank = 64

[optimizer]
type = 'adamw_optimi'
lr = 2e-5
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8
