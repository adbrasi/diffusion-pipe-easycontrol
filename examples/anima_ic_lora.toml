output_dir = '/workspace/ic_lora_output'
dataset = 'examples/anima_ic_lora_dataset.toml'

epochs = 15
micro_batch_size_per_gpu = 1
gradient_accumulation_steps = 4
gradient_clipping = 1.0
warmup_steps = 100
save_every_n_epochs = 1
save_every_n_steps = 250
activation_checkpointing = true
pipeline_stages = 1
partition_method = 'parameters'

[model]
type = 'ic_lora'
transformer_path = '/workspace/models_anima/split_files/diffusion_models/anima-preview2.safetensors'
vae_path = '/workspace/models_anima/split_files/vae/qwen_image_vae.safetensors'
llm_path = '/workspace/models_anima/split_files/text_encoders/qwen_3_06b_base.safetensors'
dtype = 'bfloat16'

# IC-LoRA uses standard PEFT LoRA — no custom LoRA needed
[adapter]
type = 'lora'
rank = 32
alpha = 32
target_modules = ['q_proj', 'k_proj', 'v_proj', 'output_proj']
# Target only self-attention. For stronger results, add cross-attention and MLP:
# target_modules = ['q_proj', 'k_proj', 'v_proj', 'output_proj', 'layer1', 'layer2']

[optimizer]
type = 'adamw_optimi'
lr = 1e-4
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8
